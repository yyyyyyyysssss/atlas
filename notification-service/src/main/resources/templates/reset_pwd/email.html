<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas - 重置账户密码</title>
    <style>
        /* 针对邮件客户端的重置样式 */
        body, table, td, p, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; }
        body { margin: 0; padding: 0; width: 100% !important; background-color: #ffffff; }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">

<!-- 外层容器表格 -->
<table border="0" cellpadding="0" cellspacing="0" width="100%" style="table-layout: fixed;">
    <tr>
        <td align="center" style="padding: 40px 20px; background-color: #ffffff;">

            <!--[if (gte mso 9)|(IE)]>
            <table align="center" border="0" cellspacing="0" cellpadding="0" width="500">
                <tr>
                    <td>
            <![endif]-->

            <!-- 主体卡片 -->
            <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 500px; border: 1px solid #d0d7de; border-radius: 6px; overflow: hidden; background-color: #ffffff;">
                <!-- Header 区域 -->
                <tr>
                    <td align="center" bgcolor="#f6f8fa" style="padding: 24px; border-bottom: 1px solid #d0d7de;">
                        <h1 style="font-size: 24px; font-weight: 600; color: #24292f; margin: 0; letter-spacing: -0.5px; line-height: 1.2;">Atlas</h1>
                    </td>
                </tr>

                <!-- Content 区域 -->
                <tr>
                    <td style="padding: 32px 24px; color: #24292f;">
                        <!-- 重置密码业务专属标题 -->
                        <h2 style="font-size: 20px; font-weight: 600; margin-top: 0; margin-bottom: 24px; color: #24292f; line-height: 1.3;">重置您的账户密码</h2>
                        <p style="font-size: 14px; color: #24292f; margin: 0 0 24px 0; line-height: 1.6;">
                            您好，<br><br>
                            您正在尝试重置 Atlas 账户的登录密码。请在密码重置页面输入以下验证码以继续操作：
                        </p>

                        <!-- 验证码外框 -->
                        <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom: 32px;">
                            <tr>
                                <td align="center">
                                    <div style="display: inline-block; font-size: 32px; font-weight: 600; color: #24292f; letter-spacing: 6px; padding: 16px 32px; background-color: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, 'Liberation Mono', monospace;">
                                        <span th:text="${code}">{{code}}</span>
                                    </div>
                                </td>
                            </tr>
                        </table>

                        <!-- 重置密码阶段的安全风险预警 -->
                        <p style="font-size: 13px; color: #57606a; line-height: 1.6; margin: 0;">
                            验证码将在 <strong th:text="${min}" style="color: #24292f;">5</strong> 分钟后失效。<br>
                            <span style="color: #cf222e; font-weight: 500; display: block; margin-top: 8px;">
                                🚨 如果您并未发起密码重置申请，说明可能有人在尝试盗取您的账户！请绝对不要将此验证码泄漏给任何人，并建议立即前往官网检查您的账户密码安全。
                            </span>
                        </p>
                    </td>
                </tr>
            </table>

            <!-- 页脚区域 -->
            <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 500px; margin-top: 24px;">
                <tr>
                    <td align="center" style="padding: 0 24px; font-size: 12px; color: #57606a; line-height: 1.5;">
                        <p style="margin: 8px 0;">这是一封自动发送的邮件，请勿直接回复。</p>
                        <p style="margin: 8px 0;">如果您需要帮助，请联系 <a href="#" style="color: #0969da; text-decoration: none;">Atlas 支持</a></p>
                        <p style="margin: 8px 0;">&copy; 2026 Atlas. 保留所有权利。</p>
                    </td>
                </tr>
            </table>

            <!--[if (gte mso 9)|(IE)]>
            </td>
            </tr>
            </table>
            <![endif]-->

        </td>
    </tr>
</table>

</body>
</html>
