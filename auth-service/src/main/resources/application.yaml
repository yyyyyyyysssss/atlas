server:
  port: 9096
  tomcat:
    threads:
      max: 200

spring:
  application:
    name: auth-service
  main:
    allow-circular-references: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mvc:
    async:
      request-timeout: -1
  output:
    ansi:
      enabled: always
  threads:
    virtual:
      enabled: true
  cloud:
    circuitbreaker:
      resilience4j:
        disable-thread-pool: false
  config:
    import:
      - classpath:config/resilience4j.yaml
  security:
    saml2:
      relyingparty:
        registration:
          auth0:
            entity-id: "urn:atlas:sp"
            acs:
              location: ${security.issuerUrl}/saml2/sso/auth0
              binding: post
            assertingparty:
              # 身份提供商唯一标识
              entity-id: "urn:dev-u4j747mxw85uvr18.us.auth0.com"
              # 对应你的身份提供商的登录url
              singlesignon:
                url: https://dev-u4j747mxw85uvr18.us.auth0.com/samlp/4drxTRRCX7h4LRQyTdTvO3wxmTXhfnE9
                binding: post
                sign-request: false
              verification:
                credentials:
                  - certificate-location: "classpath:certs/auth0-idp.pem"


security:
  issuerUrl: https://atlas.ys0921.sbs:4443/api/auth
  uiUrl: https://atlas.ys0921.sbs:4443
  saml2AuthUrl: ${security.issuerUrl}/saml2/authenticate/{registrationId}
  authorize:
    permit:
      - /login/*
      - /refreshToken
      - /oauth2/oidc/logout
      - /oauth2/consent
      - /oauth2/activate
      - /oauth2/qr/ticket
      - /oauth2/qr/status
      - /thirdParty/**
      - /activated
      - /open/**
      - /actuator/**
      - /error
      - /favicon.ico
      - /captcha/*
      - /webauthn/authenticate/options
      - /web3/wallet/register/options
      - /internal/**
  # 用户设备最大token数量 -1 表示不限制
  coexistToken: 1
  # jwt token配置
  jwt:
    secretKey: ${ATLAS_AUTH_JWT_SECRET_KEY}
    # 单位：s:秒 m:分钟 h:小时 d:天 默认 秒
    expiration: 24h
    refreshExpiration: 7d
  # 记住密码
  rememberMe:
    secretKey: ${ATLAS_AUTH_REMEMBER_ME_SECRET_KEY}
    # 单位：s:秒 m:分钟 h:小时 d:天 默认 秒
    expiration: 7d
  webauthn:
    rpId: atlas.ys0921.sbs
    rpName: Atlas Identity Server
    origins:
      - https://atlas.ys0921.sbs:4443


logging:
  level:
    org.springframework.security: info
    com.atlas.common.core.api: info

mybatis-plus:
  mapper-locations: classpath:mapper/*xml
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

http:
  config:
    # 连接池中允许存在的最大 HTTP 连接总数（整个 JVM 进程共享）
    maxConnTotal: 500
    # 单个目标主机（同一域名 + 端口）的最大并发连接数
    maxConnPerRoute: 100
    # 从连接池中获取连接的最大等待时间 单位：秒
    connectionRequestTimeout: 5
    # 建立连接后，等待服务端返回数据的最大时间（Socket 超时） 单位：秒
    responseTimeout: 60
    # 是否跳过 HTTPS 证书校验（仅限 dev/test，生产必须为 false）
    insecureSkipVerify: true
    # HTTP 代理地址
    proxy: 'http://127.0.0.1:1081'


atlas:
  user:
    server-url: http://user-service
  auth:
    server-url: http://auth-service
  file:
    server-url: http://file-service
  notification:
    server-url: http://notification-service



management:
  endpoint:
    health:
      probes:
        enabled: true # 显式开启 Liveness 和 Readiness 探针
      show-details: always # 方便排查具体哪个组件挂了
  endpoints:
    web:
      exposure:
        include: health
