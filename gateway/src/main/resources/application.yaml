server:
  port: 9090
  tomcat:
    threads:
      max: 200

spring:
  application:
    name: gateway
  main:
    allow-circular-references: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mvc:
    async:
      request-timeout: -1
  output:
    ansi:
      enabled: always
  threads:
    virtual:
      enabled: true
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            # 用户服务
            - id: user_route
              uri: http://localhost:9091
              predicates:
                - Path=/api/user/** # 匹配以此路径开头的请求
              filters:
                - StripPrefix=2 # 转发前剥离 2 层路径

            # 认证服务
            - id: auth_route
              uri: http://localhost:9096
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=2

            # 文件服务
            - id: file_route
              uri: http://localhost:9097
              predicates:
                - Path=/api/file/**
              filters:
                - StripPrefix=2
            - id: file_access_route
              uri: http://localhost:9097
              predicates:
                - Path=/file/**

            # 消息通知服务
            - id: notification_route
              uri: http://localhost:9099
              predicates:
                - Path=/api/notification/**
              filters:
                - StripPrefix=2


rate-limit:
  services:
    - serviceId: auth-service
      uri: http://localhost:9096
      stripPrefix: 2
      limits:
        - path: /api/auth/code/send-email
          capacity: 1 # 令牌桶容量（或最大访问次数） 在指定周期内同一个 Key 最多允许访问 1 次
          periodInSeconds: 60 # 限流周期 配合 capacity 使用
          methods: ["POST"]
          keyResolverName: ipKeyResolver

security:
  loginPage: http://localhost:3000/login
  authorize:
    permit:
      - /api/auth/login
      - /api/auth/logout
      - /api/auth/login/ott
      - /api/auth/ott/generate
      - /api/auth/refreshToken
      - /api/auth/oauth2/client/**
      - /api/auth/oauth2/consent
      - /api/auth/oauth2/activate
      - /api/auth/activated
      - /api/*/open/**
      - /actuator/**
      - /api/*/actuator/**
      - /error
      - /favicon.ico
      - /api/auth/code/**
    authenticated:
      - /file/**
      - /api/file/**
      - /api/user/profile/**
      - /api/user/option/**
      - /api/user/work/schedule/**
      - /api/notification/user/announcement/**
      - /api/notification/v1/notification/sse/**
      - /api/notification/user/notification/**
  # 基于请求头的身份认证
  requestHeadAuthentications:
    - antPath: /api/internal/**
      apikey: 26662f07703c41d2a4994b8b30b101a9
  # jwt token配置
  jwt:
    secretKey: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    # 单位：s:秒 m:分钟 h:小时 d:天 默认 秒
    expiration: 24h
    refreshExpiration: 30d


logging:
  level:
    org.springframework.security: info
    org.springframework.cloud.gateway: info
    org.springframework.web: DEBUG



http:
  config:
    # 连接池中允许存在的最大 HTTP 连接总数（整个 JVM 进程共享）
    maxConnTotal: 500
    # 单个目标主机（同一域名 + 端口）的最大并发连接数
    maxConnPerRoute: 100
    # 从连接池中获取连接的最大等待时间 单位：秒
    connectionRequestTimeout: 5
    # 建立连接后，等待服务端返回数据的最大时间（Socket 超时） 单位：秒
    responseTimeout: 60
    # 是否跳过 HTTPS 证书校验（仅限 dev/test，生产必须为 false）
    insecureSkipVerify: true
    # HTTP 代理地址
    proxy:
