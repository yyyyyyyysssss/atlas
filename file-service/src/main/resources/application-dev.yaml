
spring:
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:sharding.yaml?placeholder-type=environment
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          min-idle: 10
          max-idle: 20
          max-active: 100
          max-wait: 5000


minio:
  endpoint: ${MINIO_ENDPOINT}
  bucketName: y-chat-bucket
  accessKey: ${MINIO_ACCESS_KEY}
  secretKey: ${MINIO_SECRET_KEY}

atlas:
  user:
    server-url: http://localhost:9091
  auth:
    server-url: http://localhost:9096
  file:
    server-url: http://localhost:9097
  notification:
    server-url: http://localhost:9099

file:
  access-url: http://localhost:9090
  avatar:
    base-url: https://api.dicebear.com/9.x
    default-type: avataaars
    default-format: svg