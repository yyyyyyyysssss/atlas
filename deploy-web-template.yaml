# Service: 前端访问入口
apiVersion: v1
kind: Service
metadata:
  name: ${MODULE_NAME}
  namespace: atlas
  labels:
    app: ${MODULE_NAME}
    project: atlas
spec:
  selector:
    app: ${MODULE_NAME}
    project: atlas
  ports:
    - name: http
      protocol: TCP
      port: 80         # 集群内访问端口
      targetPort: 80   # 对应 Nginx 容器监听端口
  type: ClusterIP
---

# Deployment: Nginx 静态资源部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${MODULE_NAME}
  namespace: atlas
  labels:
    app: ${MODULE_NAME}
    project: atlas

spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: ${MODULE_NAME}
      project: atlas
  # 滚动更新策略
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ${MODULE_NAME}
        project: atlas
    spec:
      imagePullSecrets:
        - name: aliyun-acr-secret
      terminationGracePeriodSeconds: 15 # 前端停机不需要像后端那么久
      containers:
        - name: ${MODULE_NAME}
          image: ${IMAGE_PATH} # 由 Jenkins 动态替换
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http-port
          lifecycle:
            preStop:
              exec:
                command: [ "/usr/sbin/nginx", "-s", "quit" ]
          # 环境变量：仅保留时区，移除 Spring 相关变量
          env:
            - name: TZ
              value: "Asia/Shanghai"

          # 健康检查 (Liveness & Readiness)
          # 对于 Nginx，直接检查 index.html 是否能正常获取
          livenessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 10 # Nginx 启动极快，10s 足够
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3

          # 资源配额：前端镜像非常轻量，不需要太多资源
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # 挂载临时目录（如果 Nginx 需要处理较大请求缓存）
          volumeMounts:
            - name: log-path
              mountPath: /var/log/nginx
      volumes:
        - name: log-path
          emptyDir: {}