<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas - 验证码</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
            background-color: #ffffff;
            color: #24292f;
            -webkit-font-smoothing: antialiased;
        }
        .wrapper {
            width: 100%;
            background-color: #ffffff;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            overflow: hidden;
            background-color: #ffffff;
        }
        .header {
            padding: 24px;
            text-align: center;
            background-color: #f6f8fa;
            border-bottom: 1px solid #d0d7de;
        }
        .logo-text {
            font-size: 24px;
            font-weight: 600;
            color: #24292f;
            margin: 0;
            letter-spacing: -0.5px;
        }
        .content {
            padding: 32px 24px;
        }
        .title {
            font-size: 20px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 24px;
            color: #24292f;
        }
        .desc {
            font-size: 14px;
            color: #24292f;
            margin: 0 0 24px 0;
            line-height: 1.5;
        }
        .code-wrapper {
            text-align: center;
            margin-bottom: 32px;
        }
        .code {
            display: inline-block;
            font-size: 32px;
            font-weight: 600;
            color: #24292f;
            letter-spacing: 6px;
            margin: 0;
            padding: 16px 32px;
            background-color: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }
        .warning {
            font-size: 13px;
            color: #57606a;
            line-height: 1.5;
            margin: 0;
        }
        .footer {
            max-width: 500px;
            margin: 24px auto 0;
            text-align: center;
            padding: 0 24px;
        }
        .footer p {
            font-size: 12px;
            color: #57606a;
            margin: 8px 0;
        }
        .footer a {
            color: #0969da;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="container">
        <div class="header">
            <div class="logo-text">Atlas</div>
        </div>

        <div class="content">
            <h2 class="title">验证您的设备或浏览器</h2>
            <p class="desc">
                您好，<br><br>
                我们收到了在 Atlas 账号上的验证请求。请输入以下验证码以继续：
            </p>

            <div class="code-wrapper">
                <p class="code" th:text="${code}">{{code}}</p>
            </div>

            <p class="warning">
                验证码将在 <strong th:text="${min}">5</strong> 分钟 后失效。<br>
                如果您没有发起此请求，请忽略此邮件。可能有人误输入了您的邮箱地址。
            </p>
        </div>
    </div>

    <div class="footer">
        <p>这是一封自动发送的邮件，请勿直接回复。</p>
        <p>如果您需要帮助，请联系 <a href="#">Atlas 支持</a></p>
        <p>&copy; 2026 Atlas. 保留所有权利。</p>
    </div>
</div>
</body>
</html>
