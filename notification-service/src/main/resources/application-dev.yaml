
spring:
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:sharding.yaml?placeholder-type=environment
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          min-idle: 10
          max-idle: 20
          max-active: 100
          max-wait: 5000


atlas:
  user:
    server-url: http://localhost:9091
  auth:
    server-url: http://localhost:9096
  file:
    server-url: http://localhost:9097
  notification:
    server-url: http://localhost:9099

sms:
  aliyun:
    accessKey: ${SMS_ALIYUN_ACCESS_KEY}
    accessSecret: ${SMS_ALIYUN_ACCESS_SECRET}
    endpoint: dypnsapi.aliyuncs.com
    signature: 速通互联验证码
    timeout: 10
    templates:
      login: 100001