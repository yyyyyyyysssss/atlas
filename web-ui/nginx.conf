
worker_processes  auto;

events {
    worker_connections  2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # --- 性能优化：基础传输 ---
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on; # 提高实时性
    keepalive_timeout  65;

    # --- 性能优化：核心 Gzip 压缩 ---
    # 开启后，前端 js/css 体积通常能缩小 60%~80%
    gzip  on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    upstream atlas_backend {
        server gateway:80;
        keepalive 32; # 保持 32 个长连接不释放
        # 保持长连接的最长时间，建议与后端网关一致
        keepalive_timeout 60s;
        # 每个长连接最大处理请求数，达到后会重新建立
        keepalive_requests 1000;
    }

    server {
        listen       80;
        server_name  atlas.ys0921.sbs;

        # --- 1. 前端静态资源根目录 ---
        location / {
            root   /usr/share/nginx/html; # 确保你的 dist 文件都在 nginx/html 目录下
            index  index.html index.htm;
            
            # 解决 React/Vue Router 刷新 404 问题
            try_files $uri $uri/ /index.html;
            
            # 针对 index.html 禁止缓存，确保前端发版后能立即更新
            if ($request_filename ~* .*\.(?:htm|html)$ ) {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }

        # --- 2. 静态资源强缓存 ---
        # 配合 Vite/Webpack 生成的带哈希的文件名，极大提升后续访问速度
        location ~* \.(?:js|css|jpg|jpeg|gif|png|ico|svg|woff|woff2)$ {
            root html;
            expires 7d;
            add_header Cache-Control "public, no-transform";
            access_log off; # 减少 IO，不记录静态资源日志
        }

        # --- 3. 后端接口代理 (带 /api) ---
        location /api {
            # # 指向上面定义的 upstream
            proxy_pass http://atlas_backend;

            # 协议与连接优化
            proxy_http_version 1.1;
            proxy_set_header Connection ""; # 配合 http 1.1 开启长连接
            
            proxy_set_header Host $host; # 动态获取 Host
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;

            # 超时调优：防止偶尔的“卡顿”
            client_max_body_size 20m;
            proxy_connect_timeout 5s;  # 连接后端超时
            proxy_read_timeout 60s;   # 等待后端响应超时
            proxy_send_timeout 60s;   # 发送请求给后端超时
            
            # 处理预检请求 (OPTIONS)
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
        # 文件访问代理 (异步流)
        location /file {
            proxy_pass http://atlas_backend;
            
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;

            # --- 关键：流式下载优化 ---
            proxy_buffering off; # 关闭缓冲区，后端流数据实时传给前端
            
            # 访问文件通常不需要上传大体积 Body，保持默认即可
            client_max_body_size 1m; 

            proxy_read_timeout 600s; # 支持超大文件长时间下载
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # SSE 专用配置
        location ~* /api/.*sse.* {
            gzip off; # 强制关闭压缩，确保流式输出实时
            proxy_pass http://atlas_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection ""; # SSE 必须是持久连接

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # SSE 核心三要素
            proxy_buffering off;    # 必须关闭，否则消息会堆积
            proxy_cache off;        # 必须关闭
            chunked_transfer_encoding off; # 某些前端库需要关闭分块传输

            # 超时时间设置：
            # 设为 1 小时，防止 Nginx 在消息间隔期间断开连接
            proxy_read_timeout 3600s;
            
            # 禁用 Nginx 对长连接的响应解析缓存
            proxy_set_header X-Accel-Buffering no;
        }

        # 错误页面配置
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}